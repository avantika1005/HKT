<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student List - AI Early Warning System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="index.css">
    <script src="auth.js"></script>
    <script src="students.js?v=3" defer></script>
</head>
<body class="bg-gradient-to-b from-purple-900 to-purple-300 min-h-screen text-white font-sans">

<header class="p-6 bg-opacity-40 relative">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-center gap-4 md:gap-0">
        <div>
            <h1 class="text-3xl md:text-4xl font-black tracking-tighter">STUDENT RISK LIST</h1>
            <p class="text-purple-200 mt-2 font-extrabold italic">KANCHIPURAM GOVERNMENT MATRIC.HR.SEC.SCHOOL</p>
        </div>
        <div>
            <a href="index.html" class="bg-purple-800 hover:bg-purple-900 text-white font-black px-5 py-3 rounded-xl shadow-lg transform hover:scale-105 transition-all flex items-center gap-2 text-sm md:text-base">
                🏠 Dashboard
            </a>
        </div>
    </div>
</header>

<div class="max-w-7xl mx-auto p-6">
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden border-t-8 border-purple-700 text-black">
        <div class="p-8">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                <h2 class="text-2xl font-black text-purple-950 uppercase tracking-tight">Processed Student Records</h2>
                
                <div class="flex items-center gap-3 bg-purple-50 p-2 rounded-2xl border border-purple-100 w-full md:w-auto">
                    <label class="text-xs font-black text-purple-400 uppercase ml-2">Sort By:</label>
                    <select id="sortDropdown" onchange="handleSortChange(this.value)" class="bg-white border-none text-purple-900 font-black text-sm p-3 rounded-xl shadow-sm outline-none focus:ring-2 focus:ring-purple-500 cursor-pointer min-w-[180px]">
                        <option value="student_id_asc">ID (Lowest First)</option>
                        <option value="student_id_desc">ID (Highest First)</option>
                        <option value="name_asc">Name (A-Z)</option>
                        <option value="name_desc">Name (Z-A)</option>
                        <option value="risk_level_desc">Risk (Highest First)</option>
                        <option value="risk_level_asc">Risk (Lowest First)</option>
                        <option value="risk_score_desc">Score (Highest First)</option>
                        <option value="risk_score_asc">Score (Lowest First)</option>
                    </select>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gradient-to-r from-purple-900 to-indigo-900 text-white">
                        <tr>
                            <th class="py-5 px-6 font-black uppercase text-xs tracking-widest border-b border-white/10 rounded-tl-xl">ID</th>
                            <th class="py-5 px-6 font-black uppercase text-xs tracking-widest border-b border-white/10">Name</th>
                            <th class="py-5 px-6 font-black uppercase text-xs tracking-widest border-b border-white/10">Grade</th>
                            <th class="py-5 px-6 font-black uppercase text-xs tracking-widest border-b border-white/10">Risk Level</th>
                            <th class="py-5 px-6 font-black uppercase text-xs tracking-widest border-b border-white/10">Score</th>
                            <th class="py-5 px-6 font-black uppercase text-xs tracking-widest border-b border-white/10 rounded-tr-xl text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody" class="divide-y divide-purple-50">
                        <!-- Data will be injected here -->
                        <tr>
                            <td colspan="6" class="py-8 text-center text-gray-500 font-bold italic">Loading student data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <!-- Pagination Controls -->
            <div id="paginationControls" class="flex justify-center mt-8"></div>
        </div>
    </div>
</div>

<footer class="w-full text-center p-6 mt-12 bg-slate-950 text-slate-200 font-bold tracking-widest uppercase text-sm">
    KMHSC • 2026 © Only For Educational Purpose
</footer>

</body>
</html>
